<svg
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background plate for high contrast in browser tabs -->
  <rect width="100" height="100" rx="24" fill="#050117" />
  
  <!-- Subtle glow -->
  <circle cx="50" cy="50" r="40" fill="#00f0ff" opacity="0.15" filter="blur(10px)" />

  <!-- Main geometric 'H' structure -->
  <path
    d="M25 20V80M75 20V80M25 50H75"
    stroke="url(#logo-grad-primary)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Overlay circuit path -->
  <path
    d="M15 35H35V65H15M85 35H65V65H85"
    stroke="#a855f7"
    stroke-width="4"
    stroke-linecap="round"
    stroke-dasharray="4 4"
  />
  <!-- Digital Nodes -->
  <circle cx="25" cy="20" r="7" fill="#00f0ff" />
  <circle cx="75" cy="80" r="7" fill="#00f0ff" />
  <circle cx="50" cy="50" r="5" fill="#a855f7" />
  <circle cx="25" cy="50" r="5" fill="#a855f7" />
  <circle cx="75" cy="50" r="5" fill="#a855f7" />
  
  <defs>
    <linearGradient id="logo-grad-primary" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
</svg>
